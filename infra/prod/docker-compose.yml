```yaml
version: '3'
services:
  backend:
    image: my-backend:v1 # Бэкенд написан на Python или Go
    ports:
      - "6379:80" # ОШИБКА №1: Порт перепутан. Redis обычно слушает порт 6379, а веб-сервер — 80.
    healthcheck:
      test: ["CMD", "echo", "ping"] # ОШИБКА №2: Бессмысленная проверка здоровья. Даже если сервер сгорит, команда echo ping вернёт "ping".
      interval: 5s
      timeout: 3s
      retries: 3
  frontend:
    image: my-frontend:v1 # Фронтенд должен слушать стандартный веб-порт
    depends_on:
      - backend
    ports:
      - "80:8080" # ОШИБКА №3: Внешний порт 80 занят браузером. Нужно пробрасывать либо другой внешний порт, либо менять внутренний.
```
